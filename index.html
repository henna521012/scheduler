<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Schedule</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-color: #f2f2f2;
            --text-main: #333333;
            --accent-soft: #e8e1da; /* 大地色填滿樣式 */
            --accent-dark: #a89a8e;
        }

        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 400px; padding-bottom: 120px; }
        .month-header { text-align: center; font-size: 32px; letter-spacing: 2px; font-weight: 300; margin: 0; }
        .year-label { text-align: right; font-size: 14px; color: #888; margin-bottom: 20px; }

        /* 日曆網格 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; margin-bottom: 30px; }
        .weekday { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        
        .day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border-radius: 50%; cursor: pointer; transition: 0.2s;
            border: 1.5px solid transparent; position: relative;
        }
        
        /* 樣式對齊：有人有空是大地色填滿 */
        .day.has-event { background-color: var(--accent-soft); }
        /* 樣式對齊：正在查看/選取是黑色圈圈 */
        .day.active-view { border-color: #333; font-weight: bold; }
        /* 編輯模式：已選取的日期變黑色填滿 */
        .day.selected-in-edit { background-color: #333; color: white; border-color: #333; }

        .day.empty { cursor: default; }

        /* 下方詳細內容 */
        .details-section { border-top: 1px solid #ccc; padding-top: 20px; margin-top: 10px; }
        .day-display { font-size: 40px; font-weight: 300; margin-bottom: 20px; }
        .event-item { display: flex; align-items: flex-start; margin-bottom: 20px; font-size: 15px; }
        .event-icon { margin-right: 15px; font-size: 18px; }
        
        /* 時段標籤：獨立的圓角矩形 */
        .time-slots-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .time-pill { 
            background: var(--accent-soft); 
            padding: 5px 14px; 
            border-radius: 20px; 
            font-size: 12px; 
            color: #555;
            font-weight: 500;
        }

        /* 底部按鈕 */
        .btn-fixed { position: fixed; bottom: 30px; width: calc(100% - 40px); max-width: 360px; z-index: 10; }
        button {
            width: 100%; padding: 16px; background: #333; color: white;
            border: none; border-radius: 5px; font-size: 14px; letter-spacing: 1px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:active { opacity: 0.8; transform: scale(0.98); }

        /* Bottom Sheet 時間選擇器 */
        #timePickerSheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: white; border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15); transition: 0.4s cubic-bezier(0, 0.55, 0.45, 1); 
            z-index: 1000; padding: 25px; box-sizing: border-box;
        }
        #timePickerSheet.show { bottom: 0; }
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); display: none; z-index: 999; 
        }
        .sheet-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .picker-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 25px 0; }
        select { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 18px; background: #f9f9f9; width: 80px; text-align: center; }
        
        .mode-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .mode-option { display: flex; align-items: center; gap: 5px; font-size: 16px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closePicker()"></div>

<div class="container">
    <div class="month-header">April</div>
    <div class="year-label">2026</div>

    <div class="calendar-grid" id="calendar">
        <div class="weekday">Mon</div><div class="weekday">Tue</div><div class="weekday">Wed</div>
        <div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
        <div class="weekday">Sun</div>
    </div>

    <div class="details-section" id="detailsArea">
        <div class="day-display" id="selectedDateLabel">1</div>
        <div id="eventList"></div>
    </div>

    <div class="btn-fixed">
        <button id="mainBtn" onclick="handleBtnClick()">EDIT MY TIME</button>
    </div>
</div>

<div id="timePickerSheet">
    <div class="sheet-title">設定 <span id="targetDate"></span> 號有空時間</div>
    
    <div class="mode-selector">
        <label class="mode-option"><input type="radio" name="timeType" value="full" checked onclick="toggleTimeSelect(false)"> 全天</label>
        <label class="mode-option"><input type="radio" name="timeType" value="custom" onclick="toggleTimeSelect(true)"> 自定義</label>
    </div>
    
    <div id="customTimeInputs" style="display: none;">
        <div class="picker-row">
            <select id="startH"></select>
            <span>:00</span>
            <span style="color: #999;">至</span>
            <select id="endH"></select>
            <span>:00</span>
        </div>
    </div>
    
    <button onclick="confirmTime()" style="margin-top: 15px;">確認選取</button>
    <button onclick="closePicker()" style="margin-top: 10px; background: #eee; color: #333;">取消</button>
</div>

<script>
    let isEditMode = false;
    let viewingDate = 1;
    let mySchedule = {}; // 暫存選取的日期與時間 { 11: "全天", 12: "8-10" }
    
    // 模擬已有的成員資料
    const mockData = {
        3: [{name: "函庭", time: ["全天"]}, {name: "成員 A", time: ["8am-10am", "2pm-5pm"]}],
        12: [{name: "成員 B", time: ["全天"]}],
        13: [{name: "成員 C", time: ["10am-12pm"]}]
    };

    // 初始化下拉選單 0-23
    const startSelect = document.getElementById('startH');
    const endSelect = document.getElementById('endH');
    for(let i=0; i<24; i++) {
        let opt = `<option value="${i}">${i}</option>`;
        startSelect.innerHTML += opt;
        endSelect.innerHTML += opt;
    }
    endSelect.value = 23;

    function renderCalendar() {
        const calendarEl = document.getElementById('calendar');
        const headers = Array.from(calendarEl.querySelectorAll('.weekday'));
        calendarEl.innerHTML = '';
        headers.forEach(h => calendarEl.appendChild(h));

        // 2026/4/1 是週三 (Mon, Tue 空格)
        for (let s = 0; s < 2; s++) {
            const d = document.createElement('div'); d.className = 'day empty';
            calendarEl.appendChild(d);
        }

        for (let i = 1; i <= 30; i++) {
            const d = document.createElement('div');
            d.className = 'day';
            d.innerText = i;

            if (isEditMode) {
                // 編輯模式：已選取的變黑底白字
                if (mySchedule[i]) d.classList.add('selected-in-edit');
                d.onclick = () => openPicker(i);
            } else {
                // 檢視模式：有人填的變大地色
                if (mockData[i]) d.classList.add('has-event');
                if (i === viewingDate) d.classList.add('active-view');
                d.onclick = () => { viewingDate = i; updateDetails(i); renderCalendar(); };
            }
            calendarEl.appendChild(d);
        }
    }

    function updateDetails(date) {
        document.getElementById('selectedDateLabel').innerText = date;
        const list = document.getElementById('eventList');
        const data = mockData[date];
        
        if (!data) {
            list.innerHTML = `<p style="color:#bbb; font-size:14px; margin-top:10px;">這天暫時沒人有空～</p>`;
            return;
        }

        list.innerHTML = data.map(user => `
            <div class="event-item">
                <div class="event-icon">👤</div>
                <div class="event-content">
                    <div style="font-weight: 500;">${user.name} 有空</div>
                    <div class="time-slots-container">
                        ${user.time.map(t => `<div class="time-pill">${t}</div>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    // 時間選擇器彈窗邏輯
    let editingDate = null;
    function openPicker(date) {
        editingDate = date;
        document.getElementById('targetDate').innerText = date;
        document.getElementById('timePickerSheet').classList.add('show');
        document.getElementById('overlay').style.display = 'block';
        
        // 如果該日期原本就有選，帶入狀態（略過以簡化流程）
    }

    function toggleTimeSelect(show) {
        document.getElementById('customTimeInputs').style.display = show ? 'block' : 'none';
    }

    function confirmTime() {
        const type = document.querySelector('input[name="timeType"]:checked').value;
        if (type === 'full') {
            mySchedule[editingDate] = "全天";
        } else {
            const s = document.getElementById('startH').value;
            const e = document.getElementById('endH').value;
            if (parseInt(s) >= parseInt(e)) {
                alert("結束時間必須晚於開始時間喔！");
                return;
            }
            mySchedule[editingDate] = `${s}:00-${e}:00`;
        }
        closePicker();
        renderCalendar();
    }

    function closePicker() {
        document.getElementById('timePickerSheet').classList.remove('show');
        document.getElementById('overlay').style.display = 'none';
    }

    // 按鈕點擊處理
    function handleBtnClick() {
        const btn = document.getElementById('mainBtn');
        const details = document.getElementById('detailsArea');

        if (!isEditMode) {
            isEditMode = true;
            btn.innerText = "SEND SCHEDULE";
            details.style.opacity = "0.3"; // 編輯時壓低背景視覺
            details.style.pointerEvents = "none";
            renderCalendar();
        } else {
            const selectedCount = Object.keys(mySchedule).length;
            if (selectedCount === 0) {
                alert("請至少選擇一個有空的日期！");
                return;
            }
            sendToLine();
        }
    }

    async function sendToLine() {
        try {
            await liff.init({ liffId: "2009607639-kKaZirpP" }); // 👈 記得確認 LIFF ID
            if (!liff.isLoggedIn()) { liff.login(); return; }
            
            const profile = await liff.getProfile();
            const summary = Object.entries(mySchedule)
                .sort((a,b) => a[0]-b[0])
                .map(([d, t]) => `${d}號(${t})`)
                .join(', ');

            await liff.sendMessages([{
                type: 'text',
                text: `📅 [SSWT 排程更新]\n${profile.displayName} 已回報 4 月份有空日期：\n${summary}\n\n(系統已同步至 4/11 Demo 環境)`
            }]);
            
            liff.closeWindow();
        } catch (e) {
            console.error(e);
            alert("傳送失敗，請確認 Scopes 是否包含 chat_message.write");
        }
    }

    // 初次載入
    renderCalendar();
    updateDetails(1);
</script>

</body>
</html>
