<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Schedule</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-color: #f2f2f2;
            --text-main: #333333;
            --accent-soft: #e8e1da;
            --accent-dark: #a89a8e;
        }

        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; padding-bottom: 120px; }
        .month-header { text-align: center; font-size: 32px; letter-spacing: 2px; font-weight: 300; margin: 0; }
        .year-label { text-align: right; font-size: 14px; color: #888; margin-bottom: 20px; }

        /* 日曆網格 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; margin-bottom: 30px; }
        .weekday { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        
        .day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border-radius: 50%; cursor: pointer; transition: 0.2s;
            border: 1.5px solid transparent;
        }
        
        /* 檢視：有人有空 */
        .day.has-event { background-color: var(--accent-soft); }
        /* 共通：正在查看/選取中的黑色圈圈 */
        .day.active-view { border-color: #333; font-weight: bold; }

        .day.empty { cursor: default; }

        /* 下方編輯/顯示區塊 */
        .details-section { border-top: 1px solid #ccc; padding-top: 20px; margin-top: 10px; width: 100%; }
        .day-display { font-size: 40px; font-weight: 300; margin-bottom: 20px; }

        /* 內嵌按鈕樣式 (大地色圓角矩形) */
        .time-option-container { display: flex; gap: 10px; margin-top: 10px; }
        .time-btn {
            background: #fff; border: 1.5px solid var(--accent-soft);
            padding: 8px 16px; border-radius: 20px; font-size: 14px;
            color: var(--text-main); cursor: pointer; transition: 0.2s;
        }
        .time-btn.selected {
            background: var(--accent-soft);
            border-color: var(--accent-soft);
            font-weight: bold;
        }

        /* 底部按鈕 */
        .btn-fixed { position: fixed; bottom: 30px; width: calc(100% - 40px); max-width: 360px; z-index: 10; }
        .main-action-btn {
            width: 100%; padding: 16px; background: #333; color: white;
            border: none; border-radius: 5px; font-size: 14px; letter-spacing: 1px;
            cursor: pointer; font-weight: bold;
        }

        /* 迷你時間選擇彈窗 */
        #miniPicker {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; z-index: 1001;
            width: 80%; max-width: 300px; text-align: center;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1000; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="container">
    <div class="month-header">April</div>
    <div class="year-label">2026</div>

    <div class="calendar-grid" id="calendar">
        <div class="weekday">Mon</div><div class="weekday">Tue</div><div class="weekday">Wed</div>
        <div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
        <div class="weekday">Sun</div>
    </div>

    <div class="details-section" id="detailsArea">
        <div class="day-display" id="selectedDateLabel">1</div>
        
        <div id="editOptions" style="display:none;">
            <p style="font-size:14px; color:#888;">設定這天你有空的時間：</p>
            <div class="time-option-container">
                <div id="btnFull" class="time-btn" onclick="setTime('full')">全天</div>
                <div id="btnCustom" class="time-btn" onclick="openMiniPicker()">自訂時間</div>
            </div>
            <p id="timeStatus" style="font-size:12px; color:var(--accent-dark); margin-top:10px;"></p>
        </div>

        <div id="viewContent">
            <p style="color:#bbb; font-size:14px;">點擊 EDIT 開始編輯</p>
        </div>
    </div>

    <div class="btn-fixed">
        <button class="main-action-btn" id="mainBtn" onclick="handleBtnClick()">EDIT MY TIME</button>
    </div>
</div>

<div id="miniPicker">
    <div style="font-weight:bold; margin-bottom:15px;">自訂時間</div>
    <select id="startH"></select> :00 至 <select id="endH"></select> :00
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button onclick="confirmCustomTime()" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:5px;">確定</button>
        <button onclick="closeMiniPicker()" style="flex:1; padding:10px; background:#eee; color:#333; border:none; border-radius:5px;">取消</button>
    </div>
</div>

<script>
    let isEditMode = false;
    let viewingDate = 1;
    let mySchedule = {}; // { 11: "全天", 12: "08:00-10:00" }

    // 初始化時間下拉選單
    const sH = document.getElementById('startH');
    const eH = document.getElementById('endH');
    for(let i=0; i<24; i++) {
        sH.innerHTML += `<option value="${i}">${i}</option>`;
        eH.innerHTML += `<option value="${i}">${i}</option>`;
    }
    eH.value = 23;

    function renderCalendar() {
        const calendarEl = document.getElementById('calendar');
        const headers = Array.from(calendarEl.querySelectorAll('.weekday'));
        calendarEl.innerHTML = '';
        headers.forEach(h => calendarEl.appendChild(h));

        for (let s = 0; s < 2; s++) {
            const d = document.createElement('div'); d.className = 'day empty';
            calendarEl.appendChild(d);
        }

        for (let i = 1; i <= 30; i++) {
            const d = document.createElement('div');
            d.className = 'day';
            d.innerText = i;
            // 無論哪種模式，正在點選的都是黑色圈圈
            if (i === viewingDate) d.classList.add('active-view');
            // 檢視模式下，有人填過的顯示大地色
            if (!isEditMode && [3, 12, 13].includes(i)) d.classList.add('has-event');

            d.onclick = () => {
                viewingDate = i;
                document.getElementById('selectedDateLabel').innerText = i;
                if (isEditMode) updateEditUI();
                renderCalendar();
            };
            calendarEl.appendChild(d);
        }
    }

    function updateEditUI() {
        const status = mySchedule[viewingDate];
        const btnFull = document.getElementById('btnFull');
        const btnCustom = document.getElementById('btnCustom');
        const statusText = document.getElementById('timeStatus');

        btnFull.classList.remove('selected');
        btnCustom.classList.remove('selected');
        statusText.innerText = "";

        if (status === "全天") {
            btnFull.classList.add('selected');
        } else if (status) {
            btnCustom.classList.add('selected');
            statusText.innerText = `已設定：${status}`;
        }
    }

    function setTime(type) {
        if (type === 'full') {
            if (mySchedule[viewingDate] === "全天") {
                delete mySchedule[viewingDate];
            } else {
                mySchedule[viewingDate] = "全天";
            }
            updateEditUI();
        }
    }

    function openMiniPicker() {
        document.getElementById('miniPicker').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeMiniPicker() {
        document.getElementById('miniPicker').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function confirmCustomTime() {
        const s = document.getElementById('startH').value;
        const e = document.getElementById('endH').value;
        if (parseInt(s) >= parseInt(e)) { alert("時間設定錯誤"); return; }
        mySchedule[viewingDate] = `${s}:00-${e}:00`;
        closeMiniPicker();
        updateEditUI();
    }

    function handleBtnClick() {
        if (!isEditMode) {
            isEditMode = true;
            document.getElementById('mainBtn').innerText = "SEND SCHEDULE";
            document.getElementById('editOptions').style.display = "block";
            document.getElementById('viewContent').style.display = "none";
            renderCalendar();
        } else {
            sendToLine();
        }
    }

    async function sendToLine() {
        try {
            await liff.init({ liffId: "2009607639-kKaZirpP" });
            const profile = await liff.getProfile();
            const summary = Object.entries(mySchedule).map(([d, t]) => `${d}號(${t})`).join(', ');
            await liff.sendMessages([{ type: 'text', text: `📅 [SSWT 排程更新]\n${profile.displayName} 已回報：\n${summary}` }]);
            liff.closeWindow();
        } catch (e) { alert("傳送失敗"); }
    }

    renderCalendar();
</script>
</body>
</html>
