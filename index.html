<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Schedule</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-color: #f2f2f2;
            --text-main: #333333;
            --accent-soft: #e8e1da;
            --accent-dark: #a89a8e;
        }

        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; padding-bottom: 120px; }
        .month-header { text-align: center; font-size: 32px; letter-spacing: 2px; font-weight: 300; margin: 0; }
        .year-label { text-align: right; font-size: 14px; color: #888; margin-bottom: 20px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; margin-bottom: 30px; }
        .weekday { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        
        .day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border-radius: 50%; cursor: pointer; transition: 0.2s;
            border: 1.5px solid transparent; position: relative;
        }
        
        /* 檢視模式：有人填過的樣式 (大地色填滿) */
        .day.has-event { background-color: var(--accent-soft); }
        
        /* 編輯模式：有人有空 (大地色粗底線在數字下方) */
        .day.has-event-underline::after {
            content: ''; position: absolute; bottom: 4px; left: 20%; width: 60%; height: 3px;
            background-color: var(--accent-dark); border-radius: 2px;
        }

        /* 共通：正在選取中的黑色圓框 */
        .day.active-view { border: 1.5px solid #333 !important; font-weight: bold; }
        .day.empty { cursor: default; }

        /* 下方詳細區域 */
        .details-section { border-top: 1px solid #ccc; padding-top: 20px; margin-top: 10px; width: 100%; }
        .day-display { font-size: 40px; font-weight: 300; margin-bottom: 20px; }

        /* 圓角矩形標籤 */
        .time-slots-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .time-pill { background: var(--accent-soft); padding: 5px 14px; border-radius: 20px; font-size: 12px; color: #555; font-weight: 500; }

        /* 內嵌按鈕樣式 */
        .time-option-container { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 15px; }
        .time-btn {
            background: #fff; border: 1.5px solid var(--accent-soft);
            padding: 8px 16px; border-radius: 20px; font-size: 14px;
            color: var(--text-main); cursor: pointer; transition: 0.2s;
        }
        .time-btn.selected { background: var(--accent-soft); border-color: var(--accent-soft); font-weight: bold; }

        /* 底部按鈕 */
        .btn-fixed { position: fixed; bottom: 30px; width: calc(100% - 40px); max-width: 360px; z-index: 10; }
        .main-action-btn { width: 100%; padding: 16px; background: #333; color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; }

        /* 彈窗樣式 */
        #customTimePicker {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; z-index: 1001; width: 85%; max-width: 320px;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1000; }
        .picker-title { font-weight: bold; font-size: 18px; margin-bottom: 20px; text-align: center; }
        .time-row { display: flex; align-items: center; margin-bottom: 15px; font-size: 16px; justify-content: space-between; }
        .select-group { display: flex; align-items: center; gap: 5px; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ddd; font-size: 15px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closePicker()"></div>

<div class="container">
    <div class="month-header">April</div>
    <div class="year-label">2026</div>

    <div class="calendar-grid" id="calendar">
        <div class="weekday">Mon</div><div class="weekday">Tue</div><div class="weekday">Wed</div>
        <div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
        <div class="weekday">Sun</div>
    </div>

    <div class="details-section" id="detailsArea">
        <div class="day-display" id="selectedDateLabel">1</div>
        
        <div id="editWrapper" style="display:none; margin-bottom:25px; padding-bottom:15px; border-bottom:1px dashed #ddd;">
            <p id="editHintLabel" style="font-size:14px; color:#888;">設定這天你有空的時間：</p>
            <div class="time-option-container" id="optionBtns">
                <div id="btnFull" class="time-btn" onclick="toggleFullDay()">全天</div>
                <div id="btnCustom" class="time-btn" onclick="openPicker()">自訂時間</div>
            </div>
            <p id="timeStatus" style="font-size:13px; color:var(--accent-dark); font-weight:500;"></p>
        </div>

        <div id="editViewContent" style="display:none;"></div>

        <div id="viewContent"></div>
    </div>

    <div class="btn-fixed">
        <button class="main-action-btn" id="mainBtn" onclick="handleBtnClick()">EDIT MY TIME</button>
    </div>
</div>

<div id="customTimePicker">
    <div class="picker-title">自訂時間</div>
    <div class="time-row"><span>BEGIN</span><div class="select-group"><select id="sh"></select> 點 <select id="sm"></select> 分</div></div>
    <div class="time-row"><span>END</span><div class="select-group"><select id="eh"></select> 點 <select id="em"></select> 分</div></div>
    <div style="margin-top:25px; display:flex; gap:10px;">
        <button onclick="saveCustomTime()" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:5px;">確定</button>
        <button onclick="closePicker()" style="flex:1; padding:12px; background:#eee; color:#333; border:none; border-radius:5px;">取消</button>
    </div>
</div>

<script>
    let isEditMode = false;
    let viewingDate = 1;
    let mySchedule = {}; 
    const mockData = {
        3: [{name: "函庭", time: ["全天"]}, {name: "成員 A", time: ["08:30-10:00", "14:00-17:00"]}],
        12: [{name: "成員 B", time: ["全天"]}],
        24: [{name: "成員 C", time: ["19:00-22:00"]}]
    };

    const sh=document.getElementById('sh'), sm=document.getElementById('sm'), eh=document.getElementById('eh'), em=document.getElementById('em');
    for(let i=0;i<24;i++){ let v=i.toString().padStart(2,'0'); sh.innerHTML+=`<option value="${v}">${v}</option>`; eh.innerHTML+=`<option value="${v}">${v}</option>`; }
    for(let i=0;i<60;i+=15){ let v=i.toString().padStart(2,'0'); sm.innerHTML+=`<option value="${v}">${v}</option>`; em.innerHTML+=`<option value="${v}">${v}</option>`; }
    sh.value="08"; sm.value="30"; eh.value="21"; em.value="45";

    function renderCalendar() {
        const calendarEl = document.getElementById('calendar');
        const headers = Array.from(calendarEl.querySelectorAll('.weekday'));
        calendarEl.innerHTML = '';
        headers.forEach(h => calendarEl.appendChild(h));

        for (let s = 0; s < 2; s++) { calendarEl.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'})); }

        for (let i = 1; i <= 30; i++) {
            const d = document.createElement('div');
            d.className = 'day'; d.innerText = i;
            
            // 黑色圓框：當前選中
            if (i === viewingDate) d.classList.add('active-view');
            
            if (!isEditMode) {
                // 檢視模式：有人填過的樣式 (大地色填滿)
                if (mockData[i]) d.classList.add('has-event');
            } else {
                // 編輯模式：有人有空 (大地色粗底線在數字下方)
                if (mockData[i]) d.classList.add('has-event-underline');
            }

            d.onclick = () => {
                if (isEditMode && viewingDate === i && mySchedule[i]) {
                    delete mySchedule[i]; // 取消選取
                } else {
                    viewingDate = i;
                    // 編輯模式下，只要點到，預設全天大地色填滿
                    if (isEditMode && !mySchedule[i]) mySchedule[i] = "全天";
                }
                document.getElementById('selectedDateLabel').innerText = viewingDate;
                isEditMode ? updateEditUI(viewingDate) : updateViewUI(viewingDate);
                renderCalendar();
            };
            calendarEl.appendChild(d);
        }
    }

    function updateViewUI(date) {
        const content = document.getElementById('viewContent');
        const data = mockData[date];
        if (!data) { content.innerHTML = `<p style="color:#bbb; font-size:14px;">這天暫時沒人回報</p>`; return; }
        content.innerHTML = data.map(user => `
            <div style="margin-bottom:15px;">
                <div style="font-weight:500;">${user.name} 有空</div>
                <div class="time-slots-container">${user.time.map(t => `<div class="time-pill">${t}</div>`).join('')}</div>
            </div>
        `).join('');
    }

    function updateEditUI(date) {
        const status = mySchedule[date];
        const editWrapper = document.getElementById('editWrapper');
        const statusText = document.getElementById('timeStatus');
        const btnFull = document.getElementById('btnFull');
        const btnCustom = document.getElementById('btnCustom');
        const editViewContent = document.getElementById('editViewContent');

        // 更新自己的設定區塊
        if (!status) {
            editWrapper.style.display = "none";
        } else {
            editWrapper.style.display = "block";
            btnFull.classList.toggle('selected', status === "全天");
            btnCustom.classList.toggle('selected', status !== "全天");
            statusText.innerText = `當前設定：${status}`;
        }

        // 無論有沒有設定自己的時間，都要顯示 MockData (大家的時間)
        const data = mockData[date];
        if (!data) {
            editViewContent.innerHTML = `<p style="color:#bbb; font-size:13px; font-style:italic;">其他人尚未設定排程</p>`;
        } else {
            editViewContent.innerHTML = `
                <p style="font-size:14px; color:#888; margin-bottom:10px;">成員排程：</p>
                ${data.map(user => `
                    <div style="margin-bottom:15px; font-size:14px;">
                        <div style="font-weight:500;">🖤 ${user.name} 有空</div>
                        <div class="time-slots-container">${user.time.map(t => `<div class="time-pill" style="font-size:11px;">${t}</div>`).join('')}</div>
                    </div>
                `).join('')}
            `;
        }
    }

    function toggleFullDay() { mySchedule[viewingDate] = "全天"; updateEditUI(viewingDate); renderCalendar(); }
    function openPicker() { document.getElementById('customTimePicker').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function closePicker() { document.getElementById('customTimePicker').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function saveCustomTime() { mySchedule[viewingDate] = `${sh.value}:${sm.value}-${eh.value}:${em.value}`; closePicker(); updateEditUI(viewingDate); renderCalendar(); }

    function handleBtnClick() {
        if (!isEditMode) {
            isEditMode = true;
            document.getElementById('mainBtn').innerText = "SEND SCHEDULE";
            document.getElementById('viewContent').style.display = "none";
            document.getElementById('editViewContent').style.display = "block"; // 顯示編輯模式的 MockData
            mySchedule[viewingDate] = "全天";
            updateEditUI(viewingDate);
        } else {
            sendToLine();
        }
        renderCalendar();
    }

    async function sendToLine() {
        try {
            await liff.init({ liffId: "2009607639-kKaZirpP" });
            const profile = await liff.getProfile();
            const summary = Object.entries(mySchedule).map(([d, t]) => `${d}號(${t})`).join(', ');
            await liff.sendMessages([{ type: 'text', text: `📅 [SSWT 排程更新]\n${profile.displayName} 已回報：\n${summary}` }]);
            liff.closeWindow();
        } catch (e) { alert("傳送失敗"); }
    }

    renderCalendar();
    updateViewUI(1);
</script>
</body>
</html>
