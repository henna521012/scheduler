<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSWT 四季排程校準器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-color: #1750a1; /* 深藍 - 專業感 */
            --accent-color: #e67e22;  /* 橘色 - 秋天感 */
            --bg-color: #f8f9fa;
            --text-color: #2c3e50;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            line-height: 1.6;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0; color: var(--primary-color); font-size: 22px; }
        .header p { font-size: 14px; color: #7f8c8d; margin-top: 5px; }

        .calendar-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .month-label {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            padding-left: 5px;
            border-left: 4px solid var(--accent-color);
        }

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
        }

        .weekday { 
            text-align: center; 
            font-size: 12px; 
            font-weight: bold; 
            color: #bdc3c7; 
            padding-bottom: 10px;
        }

        .day { 
            aspect-ratio: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1.5px solid #f1f2f6; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 15px; 
            transition: all 0.2s;
            background: #fff;
        }

        .day:active { transform: scale(0.9); }
        
        .day.selected { 
            background-color: var(--primary-color); 
            color: white; 
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(23, 80, 161, 0.3);
        }

        .day.empty { border: none; cursor: default; }

        .footer-action { margin-top: 30px; }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 17px; 
            font-weight: bold; 
            box-shadow: 0 4px 12px rgba(23, 80, 161, 0.2);
            cursor: pointer;
        }

        button:disabled { background: #ccc; box-shadow: none; }

        .hint {
            font-size: 12px;
            text-align: center;
            color: #95a5a6;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>新家趴踢 🏠 任務排程</h2>
        <p>選擇 4 月份你可以參加的日期</p>
    </div>

    <div class="calendar-container">
        <div class="month-label">2026 年 4 月</div>
        <div class="calendar-grid" id="calendar">
            <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
            <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div>
            <div class="weekday">六</div>
        </div>
    </div>

    <div class="footer-action">
        <button id="submitBtn" onclick="sendData()">確認送出排程</button>
        <p class="hint">按下送出後，結果將自動發佈於群組</p>
    </div>

    <script>
        const selectedDates = [];
        const calendarEl = document.getElementById('calendar');
        
        // 2026年4月1日是週三，前面補3個空格
        for (let s = 0; s < 3; s++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'day empty';
            calendarEl.appendChild(emptyDiv);
        }

        // 產生 4 月份 1-30 號
        for (let i = 1; i <= 30; i++) {
            const div = document.createElement('div');
            div.className = 'day';
            div.innerText = i;
            div.onclick = () => {
                div.classList.toggle('selected');
                const dateStr = `4/${i}`;
                const index = selectedDates.indexOf(dateStr);
                if (index > -1) selectedDates.splice(index, 1);
                else selectedDates.push(dateStr);
            };
            calendarEl.appendChild(div);
        }

        // 初始化 LIFF
        async function initializeLiff() {
            try {
                await liff.init({ liffId: "YOUR_LIFF_ID" }); // 👈 記得換成你的 LIFF ID
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
            }
        }

        async function sendData() {
            if (selectedDates.length === 0) {
                alert("請至少選一個日期！");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                const profile = await liff.getProfile();
                const displayName = profile.displayName;
                
                // 排序日期
                selectedDates.sort((a, b) => parseInt(a.split('/')[1]) - parseInt(b.split('/')[1]));

                await liff.sendMessages([{
                    type: 'text',
                    text: `📅 [SSWT 排程回報]\n使用者：${displayName}\n事件：新家趴踢\n可用日期：${selectedDates.join(', ')}\n\n(由 SSWT Protocol 自動發送)`
                }]);
                
                liff.closeWindow();
            } catch (err) {
                alert("傳送失敗，請確認是否已給予群組傳訊權限。");
                console.error(err);
                btn.disabled = false;
                btn.innerText = "確認送出排程";
            }
        }

        initializeLiff();
    </script>
</body>
</html>
